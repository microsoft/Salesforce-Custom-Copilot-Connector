version: v1.9

environmentFolderPath: ./env

# Triggered when 'teamsapp provision' is executed
provision:
  # Commented out - using existing Azure AD app
  # - uses: aadApp/create
  #   with:
  #     name: Salesforce-${{TEAMSFX_ENV}}
  #     generateClientSecret: true
  #     signInAudience: AzureADMyOrg
  #     serviceManagementReference: 345111f9-0ccb-47af-a3d8-0b17ba382a47
  #   writeToEnvironmentFile:
  #     clientId: AAD_APP_CLIENT_ID
  #     clientSecret: SECRET_AAD_APP_CLIENT_SECRET
  #     objectId: AAD_APP_OBJECT_ID
  #     tenantId: AAD_APP_TENANT_ID
  #     authority: AAD_APP_OAUTH_AUTHORITY
  #     authorityHost: AAD_APP_OAUTH_AUTHORITY_HOST

  # Commented out - managing app manifest manually
  # - uses: aadApp/update
  #   with:
  #     manifestPath: ./aad.manifest.json
  #     outputFilePath: ./appPackage/build/aad.manifest.${{TEAMSFX_ENV}}.json

  - uses: file/createOrUpdateJsonFile
    with:
      target: ./local.settings.json
      appsettings:
        IsEncrypted: false
        Values:
          FUNCTIONS_WORKER_RUNTIME: node
          AzureWebJobsStorage: UseDevelopmentStorage=true
          AzureWebJobsFeatureFlags: EnableWorkerIndexing
          TEAMSFX_ENV: ${{TEAMSFX_ENV}}
          AZURE_CLIENT_ID: ${{AAD_APP_CLIENT_ID}}
          AZURE_CLIENT_SECRET: ${{SECRET_AAD_APP_CLIENT_SECRET}}
          AZURE_TENANT_ID: ${{AAD_APP_TENANT_ID}}
          CONNECTOR_ID: ${{CONNECTOR_ID}}
          CONNECTOR_NAME: ${{CONNECTOR_NAME}}
          CONNECTOR_DESCRIPTION: ${{CONNECTOR_DESCRIPTION}}
          # Salesforce Configuration
          SALESFORCE_INSTANCE_URL: ${{SALESFORCE_INSTANCE_URL}}
          SALESFORCE_API_VERSION: ${{SALESFORCE_API_VERSION}}
          SALESFORCE_CLIENT_ID: ${{SALESFORCE_CLIENT_ID}}
          SALESFORCE_CLIENT_SECRET: ${{SECRET_SALESFORCE_CLIENT_SECRET}}
          
